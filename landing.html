<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SideQuest — ADHD Focus RPG</title>
    <meta property="og:title" content="SideQuest — ADHD Focus RPG">
    <meta property="og:description" content="Turn your real-life tasks into epic quests. Built for ADHD brains.">
    <meta property="og:image" content="https://jattrisky.github.io/sidequestapp/assets/hero-phone.jpg">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #D4A843;
            --bg: #06080D;
            --muted: #5A5666;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: #fff;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .page {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Ambient glow */
        .page::before {
            content: '';
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(212,168,67,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Particles */
        .particles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
        .p {
            position: absolute; border-radius: 50%;
            background: var(--gold); opacity: 0;
            animation: rise linear infinite;
        }
        .p:nth-child(1) { left: 14%; width: 2px; height: 2px; animation-duration: 7s; animation-delay: 0s; }
        .p:nth-child(2) { left: 32%; width: 3px; height: 3px; animation-duration: 9s; animation-delay: 1.2s; }
        .p:nth-child(3) { left: 55%; width: 2px; height: 2px; animation-duration: 6s; animation-delay: 0.5s; }
        .p:nth-child(4) { left: 74%; width: 2px; height: 2px; animation-duration: 8s; animation-delay: 2s; }
        .p:nth-child(5) { left: 88%; width: 3px; height: 3px; animation-duration: 10s; animation-delay: 3s; }

        @keyframes rise {
            0% { transform: translateY(90vh); opacity: 0; }
            8% { opacity: 0.4; }
            85% { opacity: 0.15; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        h1 {
            font-weight: 900;
            font-size: clamp(38px, 10vw, 64px);
            line-height: 1.04;
            letter-spacing: -2.5px;
            margin-bottom: 16px;
            max-width: 480px;
            position: relative;
        }

        h1 .gold {
            color: var(--gold);
            text-shadow: 0 0 60px rgba(212,168,67,0.2);
        }

        .sub {
            font-size: 17px;
            color: var(--muted);
            line-height: 1.55;
            max-width: 340px;
            margin-bottom: 40px;
            position: relative;
        }

        /* CTA */
        .cta {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--gold);
            color: var(--bg);
            font-weight: 700;
            font-size: 17px;
            padding: 18px 40px;
            border-radius: 16px;
            text-decoration: none;
            transition: all 0.2s;
            position: relative;
            box-shadow: 0 4px 30px rgba(212,168,67,0.3);
        }

        .cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 50px rgba(212,168,67,0.45);
        }

        .cta:active { transform: scale(0.97); }
        .cta svg { width: 22px; height: 22px; }

        .proof {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
            position: relative;
        }

        .stars { color: var(--gold); font-size: 14px; letter-spacing: 1px; }
        .proof-text { font-size: 13px; color: #3A3640; }

        /* Footer */
        .footer {
            position: absolute;
            bottom: 20px;
            left: 0; right: 0;
            text-align: center;
        }

        .footer a {
            font-size: 11px;
            color: #222;
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.2s;
        }

        .footer a:hover { color: var(--gold); }

        /* Animations */
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { animation: fade-up 0.5s ease-out 0.1s both; }
        .sub { animation: fade-up 0.5s ease-out 0.2s both; }
        .cta { animation: fade-up 0.5s ease-out 0.3s both; }
        .proof { animation: fade-up 0.5s ease-out 0.4s both; }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 30px rgba(212,168,67,0.3); }
            50% { box-shadow: 0 4px 44px rgba(212,168,67,0.5); }
        }

        .cta { animation: fade-up 0.5s ease-out 0.3s both, pulse 3s ease-in-out 2s infinite; }
    </style>
</head>
<body>

    <div class="page">
        <div class="particles">
            <div class="p"></div><div class="p"></div><div class="p"></div>
            <div class="p"></div><div class="p"></div>
        </div>

        <h1>My ADHD brain<br>needed <span class="gold">quests,</span><br>not checkboxes.</h1>

        <p class="sub">SideQuest turns real tasks into RPG adventures with XP, loot, and a story that remembers you.</p>

        <a href="https://apps.apple.com/app/id6759470375" class="cta">

            Get It Free on the App Store
        </a>

        <div class="proof">
            <span class="stars">★★★★★</span>
            <span class="proof-text">ADHD Focus RPG · Free on iOS</span>
        </div>

        <div class="footer">
            <a href="index.html">Support</a>
            <a href="privacy-policy.html">Privacy</a>
        </div>
    </div>

</body>
</html>
