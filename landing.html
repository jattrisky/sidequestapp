<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#D4A843;--gold-dim:#B8922E;--black:#0A0A0C}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--black);color:#C8C8D0;overflow-x:hidden;-webkit-font-smoothing:antialiased;min-height:100vh;min-height:100dvh}
.page{position:relative;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:0 24px 48px;text-align:center}
.content{position:relative;z-index:1;max-width:420px;width:100%}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;opacity:0.85}
h1{font-family:'Playfair Display',serif;font-weight:900;font-size:32px;color:#F0F0F2;line-height:1.15;margin-bottom:14px}
h1 span{color:var(--gold)}
.sub{font-size:15px;color:#8A8A94;line-height:1.6;margin-bottom:28px}
.cta{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:var(--gold);color:var(--black);font-weight:600;font-size:17px;padding:18px 24px;border-radius:14px;text-decoration:none;transition:all 0.2s;-webkit-tap-highlight-color:transparent}
.cta:hover{background:var(--gold-dim);transform:translateY(-1px)}
.cta:active{transform:scale(0.98)}
.cta svg{width:22px;height:22px;flex-shrink:0}
.trial{font-family:'JetBrains Mono',monospace;font-size:12px;color:#555;margin-top:14px;letter-spacing:0.5px}
.proof{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:24px}
.stars{color:var(--gold);font-size:14px;letter-spacing:2px}
.proof-text{font-size:12px;color:#666}
.links{margin-top:32px;display:flex;justify-content:center;gap:20px}
.links a{font-size:11px;color:#444;text-decoration:none}
.links a:hover{color:#666}
@keyframes subtle-glow{0%,100%{box-shadow:0 0 0 0 rgba(212,168,67,0)}50%{box-shadow:0 0 20px 4px rgba(212,168,67,0.15)}}
.cta{animation:subtle-glow 3s ease-in-out infinite}
.fire-bg{position:absolute;inset:0;z-index:0;background:radial-gradient(ellipse at 50% 30%,rgba(212,168,67,0.08) 0%,transparent 60%),radial-gradient(ellipse at 50% 60%,rgba(180,80,20,0.05) 0%,transparent 50%),var(--black)}
@media(min-width:500px){h1{font-size:40px}.sub{font-size:16px}}
</style>
